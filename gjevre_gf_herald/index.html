<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gjevre — Grand Forks Herald Articles</title>
<meta property="og:title" content="Gjevre — Grand Forks Herald Articles">
<meta property="og:description" content="A collection of articles &amp; appearances in the Grand Forks Herald">
<meta property="og:image" content="https://cart0113.github.io/gjevre_gf_herald/og.png">
<meta property="og:url" content="https://cart0113.github.io/gjevre_gf_herald/">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&family=Libre+Franklin:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --parchment: #f5f0e8;
  --parchment-dark: #e8e0d0;
  --ink: #2c2416;
  --ink-light: #5a4d3a;
  --ink-faint: #8a7d6b;
  --accent: #8b1a1a;
  --accent-hover: #a62828;
  --rule: #c4b89c;
  --rule-dark: #9e927a;
  --card-bg: #faf7f2;
  --shadow: rgba(44, 36, 22, 0.12);
  --shadow-deep: rgba(44, 36, 22, 0.25);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Source Serif 4', 'Georgia', serif;
  background: var(--parchment);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Noise texture overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* ── Header ── */
.masthead {
  text-align: center;
  padding: 3rem 2rem 2rem;
  border-bottom: 4px double var(--rule-dark);
  background: linear-gradient(180deg, var(--parchment-dark) 0%, var(--parchment) 100%);
  position: relative;
}

.masthead::before {
  content: '';
  display: block;
  width: 60px;
  height: 3px;
  background: var(--accent);
  margin: 0 auto 1.5rem;
}

.masthead-publication {
  font-family: 'Libre Franklin', sans-serif;
  font-weight: 500;
  font-size: 0.75rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 0.75rem;
}

.masthead-title {
  font-family: 'Playfair Display', 'Georgia', serif;
  font-weight: 900;
  font-size: clamp(2rem, 5vw, 3.5rem);
  line-height: 1.15;
  color: var(--ink);
  letter-spacing: -0.02em;
}

.masthead-subtitle {
  font-family: 'Source Serif 4', serif;
  font-weight: 300;
  font-size: 1.1rem;
  color: var(--ink-light);
  margin-top: 0.75rem;
  font-style: italic;
}

.masthead-rule {
  display: block;
  width: 120px;
  height: 1px;
  background: var(--rule-dark);
  margin: 1.5rem auto 0;
}

.article-count {
  font-family: 'Libre Franklin', sans-serif;
  font-weight: 400;
  font-size: 0.8rem;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
  margin-top: 1rem;
}

/* ── Grid ── */
.grid-container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 2.5rem 2rem 4rem;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.75rem;
}

/* ── Cards ── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--rule);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  position: relative;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px var(--shadow), 0 4px 12px var(--shadow);
}

.card-image-wrap {
  width: 100%;
  aspect-ratio: 4 / 3;
  overflow: hidden;
  background: var(--parchment-dark);
  position: relative;
}

.card-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
  filter: sepia(0.08) contrast(1.02);
}

.card:hover .card-image-wrap img {
  transform: scale(1.04);
}

.card-image-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 60%, rgba(44,36,22,0.06) 100%);
  pointer-events: none;
}

.card-body {
  padding: 1.1rem 1.25rem 1.25rem;
  border-top: 1px solid var(--rule);
}

.card-number {
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 1.15rem;
  line-height: 1.3;
  color: var(--ink);
  margin-bottom: 0.5rem;
}

.card-date {
  font-family: 'Libre Franklin', sans-serif;
  font-weight: 400;
  font-size: 0.8rem;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
}

.card-note {
  font-family: 'Source Serif 4', serif;
  font-size: 0.82rem;
  font-style: italic;
  color: var(--ink-light);
  margin-top: 0.5rem;
  padding-top: 0.5rem;
  border-top: 1px solid var(--rule);
  line-height: 1.4;
}

/* ── Lightbox ── */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: rgba(20, 16, 10, 0.92);
  backdrop-filter: blur(8px);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.lightbox.active {
  display: flex;
  opacity: 1;
}

.lightbox-topbar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  z-index: 10;
  background: linear-gradient(180deg, rgba(20,16,10,0.7) 0%, transparent 100%);
}

.lightbox-info {
  color: #e8e0d0;
}

.lightbox-info-title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 1.1rem;
}

.lightbox-info-date {
  font-family: 'Libre Franklin', sans-serif;
  font-weight: 300;
  font-size: 0.8rem;
  color: #b0a590;
  margin-top: 0.15rem;
}

.lightbox-info-note {
  font-family: 'Source Serif 4', serif;
  font-weight: 300;
  font-size: 0.8rem;
  font-style: italic;
  color: #c4b89c;
  margin-top: 0.25rem;
}

.lightbox-actions {
  display: flex;
  gap: 0.5rem;
}

.lb-btn {
  width: 42px;
  height: 42px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  color: #e8e0d0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, border-color 0.2s;
  font-size: 1.1rem;
  text-decoration: none;
  position: relative;
}

.lb-btn:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.4);
}

.lb-btn .copied-tooltip {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.9);
  color: #2c2416;
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.65rem;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 3px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}

.lb-btn .copied-tooltip.show {
  opacity: 1;
}

.lightbox-viewport {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: grab;
  touch-action: none;
}

.lightbox-viewport:active { cursor: grabbing; }

.lb-img-container {
  position: relative;
  display: inline-block;
  transform-origin: center center;
  transition: none;
}

.lightbox-viewport img {
  max-width: 92vw;
  max-height: 88vh;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
  filter: drop-shadow(0 4px 24px rgba(0,0,0,0.4));
  display: block;
}

/* Highlight overlays */
.highlight-box {
  position: absolute;
  background: rgba(255, 255, 0, 0.45);
  border: none;
  border-radius: 0;
  pointer-events: none;
  margin: -0.15% -0.3%;
  padding: 0.15% 0.3%;
}

.highlights-off .highlight-box {
  display: none;
}

.lb-btn.highlight-active {
  background: rgba(255, 220, 0, 0.25);
  border-color: rgba(255, 200, 0, 0.6);
}

/* Nav arrows */
.lb-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 52px;
  height: 52px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  color: #e8e0d0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  z-index: 10;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.lb-nav:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.35);
}

.lb-nav.prev { left: 1.25rem; }
.lb-nav.next { right: 1.25rem; }

/* Bottom bar with counter */
.lightbox-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  text-align: center;
  padding: 1rem;
  background: linear-gradient(0deg, rgba(20,16,10,0.6) 0%, transparent 100%);
  pointer-events: none;
}

.lb-counter {
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.8rem;
  font-weight: 400;
  color: #b0a590;
  letter-spacing: 0.15em;
}

.lb-zoom-hint {
  font-family: 'Libre Franklin', sans-serif;
  font-size: 0.65rem;
  color: #8a7d6b;
  margin-top: 0.3rem;
  letter-spacing: 0.08em;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .masthead { padding: 2rem 1.25rem 1.5rem; }
  .grid-container { padding: 1.5rem 1rem 3rem; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
  .lb-nav { width: 40px; height: 40px; font-size: 1.1rem; }
  .lb-nav.prev { left: 0.5rem; }
  .lb-nav.next { right: 0.5rem; }
  .lightbox-topbar { padding: 0.75rem 1rem; }
  .lightbox-info-title { font-size: 0.95rem; }
}

@media (max-width: 480px) {
  .card-grid { grid-template-columns: 1fr; }
  .masthead-title { font-size: 1.75rem; }
}

/* ── Loading fade-in ── */
.card { opacity: 0; animation: fadeUp 0.5s ease forwards; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<header class="masthead">
  <h1 class="masthead-title">Gjevre</h1>
  <p class="masthead-subtitle">A collection of articles &amp; appearances in the Grand Forks Herald</p>
  <span class="masthead-rule"></span>
  <p class="article-count" id="articleCount"></p>
</header>

<main class="grid-container">
  <div class="card-grid" id="cardGrid"></div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-topbar">
    <div class="lightbox-info">
      <div class="lightbox-info-title" id="lbTitle"></div>
      <div class="lightbox-info-date" id="lbDate"></div>
      <div class="lightbox-info-note" id="lbNote"></div>
    </div>
    <div class="lightbox-actions">
      <button class="lb-btn" id="lbCopyLink" title="Copy link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <span class="copied-tooltip" id="copiedTooltip">Copied!</span>
      </button>
      <button class="lb-btn highlight-active" id="lbHighlight" title="Toggle highlights">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
      <button class="lb-btn" id="lbZoomIn" title="Zoom in">&#43;</button>
      <button class="lb-btn" id="lbZoomOut" title="Zoom out">&#8722;</button>
      <button class="lb-btn" id="lbReset" title="Reset zoom">&#8634;</button>
      <a class="lb-btn" id="lbDownload" title="Download" download>&#8595;</a>
      <button class="lb-btn" id="lbClose" title="Close">&times;</button>
    </div>
  </div>
  <button class="lb-nav prev" id="lbPrev">&#8249;</button>
  <button class="lb-nav next" id="lbNext">&#8250;</button>
  <div class="lightbox-viewport" id="lbViewport">
    <div class="lb-img-container" id="lbImgContainer">
      <img id="lbImg" src="" alt="">
    </div>
  </div>
  <div class="lightbox-bottom">
    <div class="lb-counter" id="lbCounter"></div>
    <div class="lb-zoom-hint">Scroll to zoom &middot; Drag to pan &middot; Double-click to reset</div>
  </div>
</div>

<script src="manifest.js"></script>
<script>
(function() {
  var DAYS_OF_WEEK = ['sun','mon','tue','wed','thu','fri','sat'];
  var MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,sept:8,oct:9,nov:10,dec:11};
  var ocrData = {};

  function parseSimpleYaml(text) {
    var notes = {};
    text.split('\n').forEach(function(line) {
      line = line.trim();
      if (!line || line.startsWith('#')) return;
      var colon = line.indexOf(':');
      if (colon < 0) return;
      var key = line.slice(0, colon).trim();
      var val = line.slice(colon + 1).trim();
      if ((val.startsWith('"') && val.endsWith('"')) ||
          (val.startsWith("'") && val.endsWith("'")))
        val = val.slice(1, -1);
      notes[key] = val;
    });
    return notes;
  }

  function parseFilename(filename) {
    var base = filename.replace(/\.jpg$/i, '');
    var parts = base.split('_');
    var year = parseInt(parts[parts.length - 1]);
    var day = parseInt(parts[parts.length - 2]);
    var monthRaw = parts[parts.length - 3].toLowerCase();
    var dow = parts[parts.length - 4].toLowerCase();
    var month = MONTHS[monthRaw] !== undefined ? MONTHS[monthRaw] : parseInt(monthRaw) - 1;
    var dowIndex = parts.length - 4;
    if (dowIndex < 0 || DAYS_OF_WEEK.indexOf(dow) < 0) return null;
    var title = parts.slice(0, dowIndex).map(function(w) {
      return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
    var date = new Date(year, month, day);
    var dateFormatted = date.toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    return { filename: filename, title: title, date: date, dateFormatted: dateFormatted, key: base };
  }

  function getImageUrl(filename) {
    return window.location.href.replace(/\/[^\/]*$/, '/') + filename;
  }

  function buildPage(notes) {
    var articles = IMAGE_FILES.map(parseFilename).filter(function(a) { return a !== null; })
      .sort(function(a, b) { return a.date - b.date; });
    articles.forEach(function(a) { a.note = notes[a.key] || ''; });

    document.getElementById('articleCount').textContent =
      articles.length + ' article' + (articles.length !== 1 ? 's' : '') +
      ' \u00B7 ' + articles[0].date.getFullYear() + '\u2013' +
      articles[articles.length - 1].date.getFullYear();

    // Lightbox state
    var lightbox = document.getElementById('lightbox');
    var lbImg = document.getElementById('lbImg');
    var lbTitle = document.getElementById('lbTitle');
    var lbDate = document.getElementById('lbDate');
    var lbNote = document.getElementById('lbNote');
    var lbCounter = document.getElementById('lbCounter');
    var lbDownload = document.getElementById('lbDownload');
    var lbViewport = document.getElementById('lbViewport');
    var currentIndex = 0, scale = 1, panX = 0, panY = 0;
    var isDragging = false, dragStartX, dragStartY, panStartX, panStartY;

    var lbImgContainer = document.getElementById('lbImgContainer');

    function updateTransform() {
      lbImgContainer.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + scale + ')';
    }
    function resetView() { scale = 1; panX = 0; panY = 0; updateTransform(); }

    function renderHighlights(key) {
      var old = lbImgContainer.querySelectorAll('.highlight-box');
      for (var i = 0; i < old.length; i++) old[i].remove();
      var matches = ocrData[key];
      if (!matches) return;
      for (var i = 0; i < matches.length; i++) {
        var m = matches[i];
        var box = document.createElement('div');
        box.className = 'highlight-box';
        box.style.left = m.x + '%';
        box.style.top = m.y + '%';
        box.style.width = m.w + '%';
        box.style.height = m.h + '%';
        lbImgContainer.appendChild(box);
      }
    }

    function showArticle(index) {
      var a = articles[index];
      currentIndex = index;
      lbImg.src = a.filename; lbImg.alt = a.title;
      lbTitle.textContent = a.title;
      lbDate.textContent = a.dateFormatted;
      lbNote.textContent = a.note || '';
      lbNote.style.display = a.note ? 'block' : 'none';
      lbCounter.textContent = (index + 1) + ' / ' + articles.length;
      lbDownload.href = a.filename; lbDownload.download = a.filename;
      renderHighlights(a.key);
      resetView();
    }

    function openLightbox(index) {
      showArticle(index);
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
      history.pushState({ lightbox: true }, '');
    }

    function closeLightbox(fromPopstate) {
      if (!lightbox.classList.contains('active')) return;
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      if (!fromPopstate) history.back();
    }

    function navigate(dir) {
      var next = currentIndex + dir;
      if (next < 0) next = articles.length - 1;
      if (next >= articles.length) next = 0;
      showArticle(next);
    }

    // Build cards
    var grid = document.getElementById('cardGrid');
    articles.forEach(function(article, i) {
      var card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.06) + 's';
      var noteHtml = article.note ? '<div class="card-note">' + article.note + '</div>' : '';
      card.innerHTML =
        '<div class="card-image-wrap">' +
          '<img src="' + article.filename + '" alt="' + article.title + '" loading="lazy">' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-number">Article ' + (i + 1) + '</div>' +
          '<div class="card-title">' + article.title + '</div>' +
          '<div class="card-date">' + article.dateFormatted + '</div>' +
          noteHtml +
        '</div>';
      card.addEventListener('click', function() { openLightbox(i); });
      grid.appendChild(card);
    });

    // Copy link button
    var lbCopyLink = document.getElementById('lbCopyLink');
    var copiedTooltip = document.getElementById('copiedTooltip');
    lbCopyLink.addEventListener('click', function() {
      var url = getImageUrl(articles[currentIndex].filename);
      navigator.clipboard.writeText(url).then(function() {
        copiedTooltip.classList.add('show');
        setTimeout(function() { copiedTooltip.classList.remove('show'); }, 1500);
      });
    });

    // Highlight toggle (on by default)
    var lbHighlight = document.getElementById('lbHighlight');
    lbHighlight.addEventListener('click', function() {
      lbImgContainer.classList.toggle('highlights-off');
      lbHighlight.classList.toggle('highlight-active');
    });

    // Lightbox controls
    window.addEventListener('popstate', function() { closeLightbox(true); });
    document.getElementById('lbClose').addEventListener('click', function() { closeLightbox(); });
    document.getElementById('lbPrev').addEventListener('click', function() { navigate(-1); });
    document.getElementById('lbNext').addEventListener('click', function() { navigate(1); });
    document.getElementById('lbZoomIn').addEventListener('click', function() {
      scale = Math.min(scale * 1.3, 8); updateTransform();
    });
    document.getElementById('lbZoomOut').addEventListener('click', function() {
      scale = Math.max(scale / 1.3, 0.5); updateTransform();
    });
    document.getElementById('lbReset').addEventListener('click', resetView);
    lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') navigate(-1);
      else if (e.key === 'ArrowRight') navigate(1);
      else if (e.key === '+' || e.key === '=') { scale = Math.min(scale * 1.3, 8); updateTransform(); }
      else if (e.key === '-') { scale = Math.max(scale / 1.3, 0.5); updateTransform(); }
      else if (e.key === '0') resetView();
    });

    lbViewport.addEventListener('wheel', function(e) {
      e.preventDefault();
      var delta = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.max(0.5, Math.min(8, scale * delta));
      updateTransform();
    }, { passive: false });

    lbViewport.addEventListener('mousedown', function(e) {
      if (e.target === lbImg || e.target === lbViewport) {
        isDragging = true;
        dragStartX = e.clientX; dragStartY = e.clientY;
        panStartX = panX; panStartY = panY;
        e.preventDefault();
      }
    });
    window.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      panX = panStartX + (e.clientX - dragStartX);
      panY = panStartY + (e.clientY - dragStartY);
      updateTransform();
    });
    window.addEventListener('mouseup', function() { isDragging = false; });

    lbViewport.addEventListener('dblclick', function(e) {
      e.preventDefault();
      if (scale > 1.05) resetView();
      else { scale = 2.5; updateTransform(); }
    });

    // Touch: pinch zoom + drag pan
    var touches = {}, lastPinchDist = null;
    lbViewport.addEventListener('touchstart', function(e) {
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        touches[t.identifier] = { x: t.clientX, y: t.clientY };
      }
      var ids = Object.keys(touches);
      if (ids.length === 1) {
        isDragging = true;
        dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
        panStartX = panX; panStartY = panY;
      }
      if (ids.length === 2) {
        isDragging = false;
        var t1 = touches[ids[0]], t2 = touches[ids[1]];
        lastPinchDist = Math.hypot(t2.x - t1.x, t2.y - t1.y);
      }
      e.preventDefault();
    }, { passive: false });

    lbViewport.addEventListener('touchmove', function(e) {
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        touches[t.identifier] = { x: t.clientX, y: t.clientY };
      }
      var ids = Object.keys(touches);
      if (ids.length === 2 && lastPinchDist !== null) {
        var t1 = touches[ids[0]], t2 = touches[ids[1]];
        var dist = Math.hypot(t2.x - t1.x, t2.y - t1.y);
        scale = Math.max(0.5, Math.min(8, scale * (dist / lastPinchDist)));
        lastPinchDist = dist;
        updateTransform();
      } else if (isDragging && ids.length === 1) {
        panX = panStartX + (e.touches[0].clientX - dragStartX);
        panY = panStartY + (e.touches[0].clientY - dragStartY);
        updateTransform();
      }
      e.preventDefault();
    }, { passive: false });

    lbViewport.addEventListener('touchend', function(e) {
      for (var i = 0; i < e.changedTouches.length; i++)
        delete touches[e.changedTouches[i].identifier];
      if (Object.keys(touches).length < 2) lastPinchDist = null;
      if (Object.keys(touches).length === 0) isDragging = false;
    });
  }

  Promise.all([
    fetch('notes.yaml').then(function(r) { return r.ok ? r.text() : ''; }).catch(function() { return ''; }),
    fetch('ocr.json').then(function(r) { return r.ok ? r.json() : {}; }).catch(function() { return {}; })
  ]).then(function(results) {
    ocrData = results[1];
    buildPage(parseSimpleYaml(results[0]));
  });
})();
</script>
</body>
</html>
